name: Обновить список файлов

on:
  push:
    branches: [main]
    paths:
      - 'files/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Сгенерировать files.json
        run: node scripts/generate-list.js

      - name: Закоммитить изменения
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files.json
          git diff --staged --quiet || git commit -m "chore: обновлён список файлов"
          git push
