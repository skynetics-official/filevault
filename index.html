<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileVault — хранилище файлов</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<header class="vault-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-mark">⌘</span>
      <div class="brand-text">
        <h1>FileVault</h1>
        <p class="subtitle">Личное хранилище файлов</p>
      </div>
    </div>
    <div class="stamp" id="fileCount">— записей</div>
  </div>
</header>

<main class="ledger">

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Найти файл по названию…" autocomplete="off">
    <span class="search-icon">⌕</span>
  </div>

  <div class="ledger-head">
    <span class="col-index">№</span>
    <span class="col-name">Имя файла</span>
    <span class="col-size">Размер</span>
    <span class="col-date">Добавлен</span>
    <span class="col-action"></span>
  </div>

  <div id="fileList" class="ledger-body">
    <div class="loading">Открываю хранилище…</div>
  </div>

  <div id="emptyState" class="empty-state" hidden>
    <p>Ничего не найдено.</p>
  </div>

</main>

<footer class="vault-footer">
  <p>Файлы проверяются автоматически при загрузке · <span id="lastUpdated">—</span></p>
</footer>

<script src="app.js"></script>
</body>
</html>
